<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Command Center | Glow & Grace</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #d9b99b;
            --navy: #0f172a;
            --black: #020617;
            --white: #ffffff;
            --glass: rgba(255, 255, 255, 0.03);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: var(--black); color: #d1d5db; display: flex; min-height: 100vh; }

        /* --- AUTH SCREEN --- */
        #auth-screen {
            position: fixed; width: 100%; height: 100%; background: var(--black);
            display: flex; align-items: center; justify-content: center; z-index: 3000;
        }
        .auth-card { background: var(--navy); padding: 40px; border-radius: 20px; border: 1px solid var(--primary); width: 380px; text-align: center; }

        /* --- SIDEBAR --- */
        #admin-main { display: none; width: 100%; } /* Hidden until login */
        .sidebar {
            width: 280px; background: #0a0f1d; height: 100vh; position: fixed;
            padding: 40px 20px; border-right: 1px solid rgba(217, 185, 155, 0.2);
            display: flex; flex-direction: column;
        }
        .sidebar h2 { font-family: 'Playfair Display'; color: var(--primary); margin-bottom: 40px; text-align: center; }

        .nav-btn {
            width: 100%; background: rgba(255,255,255,0.05); color: white;
            padding: 14px; margin-bottom: 10px; border-radius: 8px; border: 1px solid transparent;
            cursor: pointer; text-align: left; transition: 0.3s;
        }
        .nav-btn:hover, .nav-btn.active { background: rgba(217, 185, 155, 0.1); border-color: var(--primary); color: var(--primary); }

        /* --- CONTENT --- */
        .main-content { margin-left: 280px; padding: 50px; width: calc(100% - 280px); }
        .section { display: none; }
        .section.active { display: block; }
        h1 { font-family: 'Playfair Display'; color: white; margin-bottom: 30px; border-left: 4px solid var(--primary); padding-left: 15px; }

        .admin-card { background: var(--glass); padding: 30px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 30px; }
        
        input, select { width: 100%; padding: 12px; margin-top: 10px; background: #000; color: white; border: 1px solid rgba(217, 185, 155, 0.3); border-radius: 8px; margin-bottom: 15px; }
        .btn-action { background: var(--primary); color: black; padding: 12px 25px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; color: var(--primary); padding: 12px; border-bottom: 1px solid rgba(217, 185, 155, 0.2); font-size: 12px; }
        td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.02); font-size: 14px; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-card" id="login-form">
            <h2 style="font-family:'Playfair Display'; color:var(--primary); margin-bottom:20px;">Admin Access</h2>
            <input type="text" id="adminUser" placeholder="Username">
            <input type="password" id="adminPass" placeholder="Password">
            <button class="btn-action" style="width:100%" onclick="login()">Login to Dashboard</button>
            <p style="font-size:12px; margin-top:15px;">Secure Command Center</p>
        </div>
    </div>

    <div id="admin-main">
        <nav class="sidebar">
            <h2>Salon Admin</h2>
            <button class="nav-btn active" onclick="showSection('overview')"><i class="fas fa-chart-line"></i> Overview</button>
            <button class="nav-btn" onclick="showSection('manage-services')"><i class="fas fa-cut"></i> Manage Services</button>
            <button class="nav-btn" onclick="showSection('staff-dir')"><i class="fas fa-users"></i> Staff Directory</button>
            <button class="nav-btn" onclick="showSection('feedback')"><i class="fas fa-comment-dots"></i> Feedback Logs</button>
            
            <button class="nav-btn" style="margin-top:auto; background:#7f1d1d;" onclick="logout()">Logout</button>
        </nav>

        <main class="main-content">
            
            <section id="overview" class="section active">
                <h1>Command Overview</h1>
                <div class="admin-card">
                    <h3>Service Inventory</h3>
                    <p id="stat-text">Loading salon data...</p>
                </div>
            </section>

            <section id="manage-services" class="section">
                <h1>Service Management</h1>
                <div class="admin-card">
                    <h3>Add New Boutique Service</h3>
                    <input type="text" id="serviceName" placeholder="Service Name">
                    <input type="number" id="servicePrice" placeholder="Price (₹)">
                    <select id="serviceCat">
                        <option value="Men's">Men's Dashboard</option>
                        <option value="Women's">Women's Dashboard</option>
                    </select>
                    <button class="btn-action" onclick="saveService()">Push to Dashboard</button>
                </div>

                <div class="admin-card">
                    <h3>Current Custom Services</h3>
                    <table id="serviceTable">
                        <thead><tr><th>Name</th><th>Category</th><th>Price</th></tr></thead>
                        <tbody id="serviceListBody"></tbody>
                    </table>
                </div>
            </section>

            <section id="staff-dir" class="section">
                <h1>Staff Directory</h1>
                <div class="admin-card">
                    <input type="text" id="staffName" placeholder="Staff Name">
                    <input type="text" id="staffRole" placeholder="Role (e.g. Master Barber)">
                    <button class="btn-action" onclick="alert('Staff member registered!')">Add Staff</button>
                </div>
            </section>

            <section id="feedback" class="section">
                <h1>Guest Feedback</h1>
                <div class="admin-card">
                    <div id="msgList">No messages yet.</div>
                </div>
            </section>

        </main>
    </div>

    <script>
        // --- 1. LOGIN LOGIC ---
        function login() {
            const user = document.getElementById('adminUser').value;
            const pass = document.getElementById('adminPass').value;
            
            // Basic check for project demo
            if(user === "admin" && pass === "1234") {
                document.getElementById('auth-screen').style.display = "none";
                document.getElementById('admin-main').style.display = "flex";
                loadServiceTable();
            } else {
                alert("Invalid Credentials");
            }
        }

        function logout() {
            location.reload(); // Refresh to lock the dashboard again
        }

        // --- 2. NAVIGATION ---
        function showSection(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        // --- 3. REAL SERVICE ADDITION ---
        function saveService() {
            const name = document.getElementById('serviceName').value;
            const price = document.getElementById('servicePrice').value;
            const cat = document.getElementById('serviceCat').value;

            if(!name || !price) return alert("Please fill all fields");

            const storageKey = (cat === "Men's") ? "custom_men_services" : "custom_women_services";
            let services = JSON.parse(localStorage.getItem(storageKey) || "[]");
            
            services.push({ name, price, cat });
            localStorage.setItem(storageKey, JSON.stringify(services));

            alert(`${name} successfully added to ${cat} dashboard!`);
            loadServiceTable();
            
            document.getElementById('serviceName').value = "";
            document.getElementById('servicePrice').value = "";
        }

        function loadServiceTable() {
            const men = JSON.parse(localStorage.getItem("custom_men_services") || "[]");
            const women = JSON.parse(localStorage.getItem("custom_women_services") || "[]");
            const all = [...men, ...women];
            
            const body = document.getElementById('serviceListBody');
            body.innerHTML = all.map(s => `
                <tr>
                    <td>${s.name}</td>
                    <td>${s.cat}</td>
                    <td>₹${s.price}</td>
                </tr>
            `).join('');

            document.getElementById('stat-text').innerText = `You are currently managing ${all.length} custom services across all dashboards.`;
        }
    </script>
</body>
</html>
