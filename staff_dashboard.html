<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Directory | Glow & Grace</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #d9b99b; /* Rose Gold */
            --navy: #0f172a;
            --black: #020617;
            --white: #ffffff;
            --glass: rgba(15, 23, 42, 0.85);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Poppins', sans-serif; 
            color: #d1d5db; 
            background: linear-gradient(rgba(2, 6, 23, 0.9), rgba(2, 6, 23, 0.9)), 
                        url('https://images.unsplash.com/photo-1521590832167-7bcbfaa6381f?q=80&w=2000');
            background-attachment: fixed;
            background-size: cover;
            min-height: 100vh;
            padding: 100px 20px 50px;
        }

        /* --- NAVIGATION --- */
        nav {
            position: fixed; top: 0; width: 100%; padding: 20px 50px;
            display: flex; align-items: center;
            background: rgba(2, 6, 23, 0.98); z-index: 1000; 
            border-bottom: 1px solid rgba(217, 185, 155, 0.3);
        }
        .brand-name { font-family: 'Playfair Display', serif; font-size: 24px; letter-spacing: 2px; font-weight: 700; color: var(--primary); }

        /* --- DASHBOARD LAYOUT --- */
        .container { max-width: 1200px; margin: auto; }
        .section-header { font-family: 'Playfair Display', serif; font-size: 32px; color: var(--white); margin-bottom: 30px; border-left: 4px solid var(--primary); padding-left: 15px; }

        .staffGrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; margin-bottom: 50px; }

        /* --- STAFF CARD --- */
        .card {
            background: var(--glass);
            padding: 35px 30px;
            border-radius: 20px;
            border: 1px solid rgba(217, 185, 155, 0.1);
            text-align: center;
            backdrop-filter: blur(10px);
            transition: 0.4s;
        }
        .card:hover { transform: translateY(-10px); border-color: var(--primary); }
        .card img { width: 110px; height: 110px; border-radius: 50%; border: 2px solid var(--primary); margin-bottom: 15px; object-fit: cover; }
        .badge { background: rgba(217, 185, 155, 0.15); color: var(--primary); padding: 5px 15px; border-radius: 20px; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
        .rating { color: var(--primary); margin: 15px 0; font-size: 14px; }
        
        .btn-primary { 
            width: 100%;
            padding: 12px; 
            border-radius: 8px; 
            border: none; 
            font-size: 12px; 
            font-weight: 700; 
            cursor: pointer; 
            text-transform: uppercase; 
            background: var(--primary); 
            color: var(--black);
            transition: 0.3s;
            margin-top: 10px;
        }
        .btn-primary:hover { background: var(--white); transform: scale(1.02); }

        /* --- INSIGHT PANEL --- */
        .glass-panel {
            background: var(--glass);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(217, 185, 155, 0.1);
            margin-bottom: 40px;
            text-align: center;
        }

        /* --- MODAL --- */
        #profileModal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); display: none; align-items: center; justify-content: center; z-index: 2000; }
        .profileBox { background: var(--navy); border: 1px solid var(--primary); padding: 40px; border-radius: 20px; width: 400px; text-align: center; }
        .review { background: rgba(255,255,255,0.03); padding: 10px; margin-top: 10px; border-radius: 8px; font-size: 13px; font-style: italic; }

    </style>
</head>

<body>

    <nav>
        <div class="brand-name">GLOW & GRACE STAFF</div>
    </nav>

    <div class="container">
        
        <h2 class="section-header">Artisan Directory</h2>
        <div class="staffGrid" id="staffGrid"></div>

        <div class="glass-panel" data-aos="fade-up">
            <h3 style="color: var(--primary); font-family: 'Playfair Display'; margin-bottom: 10px;">Artisan Coverage Insight</h3>
            <p id="aiInsight" style="font-size: 15px; font-style: italic;">All master artisans are currently ready to provide elite services.</p>
        </div>

    </div>

    <div id="profileModal">
        <div class="profileBox">
            <img id="p_img" style="width: 120px; height: 120px; border-radius: 50%; border: 2px solid var(--primary);">
            <h3 id="p_name" style="font-family: 'Playfair Display'; color: var(--white); margin: 15px 0 5px;"></h3>
            <p id="p_skill" style="color: var(--primary); font-size: 12px; text-transform: uppercase;"></p>
            <hr style="margin: 20px 0; opacity: 0.1;">
            <div id="p_details" style="text-align: left; font-size: 13px; line-height: 1.8;">
                <p id="p_qual"></p>
                <p id="p_exp"></p>
                <p id="p_degree"></p>
            </div>
            <h4 style="margin-top: 20px; font-size: 14px; color: var(--white);">Guest Feedback</h4>
            <div id="reviews"></div>
            <button class="btn-primary" style="margin-top: 25px;" onclick="closeProfile()">Return to Dashboard</button>
        </div>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init();

        const staff = [
            { name: "Ajay Sharma", gender: "male", skill: "Fade Specialist", exp: "5 Years", qual: "Barber Masters", degree: "Advanced Fade", reviews: ["Absolute precision", "Best fade in Bengaluru"] },
            { name: "Elena Rao", gender: "female", skill: "Bridal Expert", exp: "7 Years", qual: "Cosmetology PhD", degree: "Intl Makeup Artist", reviews: ["Made me look like a queen", "Detail oriented"] },
            { name: "Rahul Singh", gender: "male", skill: "Hair Sculptor", exp: "6 Years", qual: "Styling Diploma", degree: "Vidal Sassoon Cert", reviews: ["Great artistic vision", "Very professional"] },
            { name: "Maya Iyer", gender: "female", skill: "Skin Guru", exp: "6 Years", qual: "Dermal Science", degree: "Facial Specialist", reviews: ["Instant glow", "Very relaxing session"] },
            { name: "Kiran Johar", gender: "male", skill: "Color Alchemist", exp: "8 Years", qual: "Global Colorist Cert", degree: "Senior Color Expert", reviews: ["Transformed my look", "Perfect highlights"] },
            { name: "Sophia Panday", gender: "female", skill: "Nail Artisan", exp: "4 Years", qual: "Elite Nail Tech", degree: "Creative Nail Artistry", reviews: ["Incredible nail art", "So creative!"] }
        ];

        // Load Staff Cards
        const grid = document.getElementById("staffGrid");
        staff.forEach((s, i) => {
            const img = s.gender === "male" 
                ? `https://randomuser.me/api/portraits/men/${i+45}.jpg` 
                : `https://randomuser.me/api/portraits/women/${i+45}.jpg`;
            
            const card = document.createElement("div");
            card.className = "card";
            card.setAttribute("data-aos", "fade-up");
            card.innerHTML = `
                <img src="${img}">
                <div class="badge">${s.skill}</div>
                <h3 style="margin-top:15px; color:#fff;">${s.name}</h3>
                <div class="rating"><i class="fas fa-star"></i> 4.9 | ${s.exp}</div>
                <button class="btn-primary" onclick="viewProfile(${i}, '${img}')">View Artisan Profile</button>
            `;
            grid.appendChild(card);
        });

        function viewProfile(i, img) {
            const s = staff[i];
            document.getElementById("profileModal").style.display = "flex";
            document.getElementById("p_img").src = img;
            document.getElementById("p_name").innerText = s.name;
            document.getElementById("p_skill").innerText = s.skill;
            document.getElementById("p_qual").innerText = "Education: " + s.qual;
            document.getElementById("p_exp").innerText = "Experience: " + s.exp;
            document.getElementById("p_degree").innerText = "Specialization: " + s.degree;
            
            const reviewBox = document.getElementById("reviews");
            reviewBox.innerHTML = "";
            s.reviews.forEach(r => {
                reviewBox.innerHTML += `<div class="review">"${r}"</div>`;
            });
        }

        function closeProfile() { document.getElementById("profileModal").style.display = "none"; }
    </script>
</body>
</html>
